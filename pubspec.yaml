name: musiary
description: "뮤지어리 - 감정을 음악으로 기록하는 감성 다이어리 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # 로컬 DB
  sqflite: ^2.4.2
  path: ^1.9.1

  # 상태 관리
  provider: ^6.1.5

  # 이미지 처리
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI
  table_calendar: ^3.1.3
  fl_chart: ^0.70.2
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.3.1
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.2

  # 날짜/시간
  intl: ^0.20.2

  # 스토리지
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # 네트워크
  http: ^1.3.2
  dio: ^5.8.0+1

  # YouTube / URL launcher
  url_launcher: ^6.3.1
  youtube_player_flutter: ^9.1.1

  # 유튜브 스트리밍 (API 키 불필요)
  youtube_explode_dart: ^2.3.6
  just_audio: ^0.9.41

  # 권한
  permission_handler: ^11.4.0

  # 아이콘/애니메이션
  flutter_svg: ^2.0.17

  # 로그인
  google_sign_in: ^6.2.2

  # 인앱 결제 (Google Play Billing)
  in_app_purchase: ^3.2.0

  # 이메일 유효성 검사
  email_validator: ^3.0.0

  # 카카오 로그인
  kakao_flutter_sdk_user: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # assets/images, assets/lottie 폴더가 생성된 경우 아래 주석 해제
  # assets:
  #   - assets/images/
  #   - assets/lottie/
  #
  # Pretendard 폰트 파일(ttf)을 assets/fonts/에 넣은 후 아래 주석 해제
  # fonts:
  #   - family: Pretendard
  #     fonts:
  #       - asset: assets/fonts/Pretendard-Regular.ttf
  #       - asset: assets/fonts/Pretendard-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Pretendard-Bold.ttf
  #         weight: 700
